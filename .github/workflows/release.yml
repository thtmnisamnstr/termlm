name: release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      release_tag:
        description: "Tag/version string for packaging (for example: v0.1.0-alpha)"
        required: true
        type: string

permissions:
  contents: write

concurrency:
  group: release-${{ github.event_name == 'workflow_dispatch' && inputs.release_tag || github.ref_name }}
  cancel-in-progress: false

jobs:
  build-and-package:
    runs-on: macos-14-arm64
    timeout-minutes: 360
    env:
      TAG_NAME: ${{ github.event_name == 'workflow_dispatch' && inputs.release_tag || github.ref_name }}
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Validate release tag
        run: |
          if [[ ! "${TAG_NAME}" == v* ]]; then
            echo "release tag must start with v: ${TAG_NAME}" >&2
            exit 2
          fi
          if [[ "${TAG_NAME}" =~ [Xx]\.[Yy]\.[Zz] || "${TAG_NAME}" == *"<"* || "${TAG_NAME}" == *">"* ]]; then
            echo "release tag must be concrete, not a placeholder: ${TAG_NAME}" >&2
            exit 2
          fi
          if [[ "${TAG_NAME}" == *[[:space:]/\\]* ]]; then
            echo "release tag must not contain whitespace or path separators: ${TAG_NAME}" >&2
            exit 2
          fi
      - run: if ! command -v cmake >/dev/null 2>&1; then brew install cmake; fi
      - run: if ! command -v rg >/dev/null 2>&1; then brew install ripgrep; fi
      - run: if ! command -v expect >/dev/null 2>&1; then brew install expect; fi
      - run: if ! command -v shellcheck >/dev/null 2>&1; then brew install shellcheck; fi
      - run: python3 scripts/ci/check_docs_links.py
      - run: bash scripts/ci/lint_shell.sh
      - run: cargo fmt --check
      - run: cargo clippy --workspace --all-targets --locked -- -D warnings
      - run: cargo test --workspace --all-targets --release --locked
      - run: bash tests/adapter-contract/zsh_adapter_contract.sh
      - run: bash tests/release/release_smoke.sh
      - run: cargo build -p termlm-client -p termlm-core --release --locked
      - name: Prepare release bundles
        run: |
          mkdir -p dist
          scripts/release/package_release.sh \
            --mode no-models \
            --version "${TAG_NAME}" \
            --target darwin-arm64 \
            --out dist
          scripts/release/package_release.sh \
            --mode with-models \
            --version "${TAG_NAME}" \
            --target darwin-arm64 \
            --out dist
      - name: Resolve signing configuration
        id: signing
        env:
          APPLE_SIGNING_CERT_P12_BASE64: ${{ secrets.APPLE_SIGNING_CERT_P12_BASE64 }}
          APPLE_SIGNING_CERT_PASSWORD: ${{ secrets.APPLE_SIGNING_CERT_PASSWORD }}
          APPLE_CODESIGN_IDENTITY: ${{ secrets.APPLE_CODESIGN_IDENTITY }}
          APPLE_NOTARY_APPLE_ID: ${{ secrets.APPLE_NOTARY_APPLE_ID }}
          APPLE_NOTARY_APP_PASSWORD: ${{ secrets.APPLE_NOTARY_APP_PASSWORD }}
          APPLE_NOTARY_TEAM_ID: ${{ secrets.APPLE_NOTARY_TEAM_ID }}
        run: |
          if [[ -n "${APPLE_SIGNING_CERT_P12_BASE64}" && -n "${APPLE_SIGNING_CERT_PASSWORD}" && -n "${APPLE_CODESIGN_IDENTITY}" ]]; then
            echo "codesign=true" >> "${GITHUB_OUTPUT}"
          else
            echo "codesign=false" >> "${GITHUB_OUTPUT}"
          fi
          if [[ -n "${APPLE_NOTARY_APPLE_ID}" && -n "${APPLE_NOTARY_APP_PASSWORD}" && -n "${APPLE_NOTARY_TEAM_ID}" ]]; then
            echo "notary=true" >> "${GITHUB_OUTPUT}"
          else
            echo "notary=false" >> "${GITHUB_OUTPUT}"
          fi
      - name: Import Apple codesigning certificate
        if: ${{ steps.signing.outputs.codesign == 'true' }}
        uses: apple-actions/import-codesign-certs@v3
        with:
          p12-file-base64: ${{ secrets.APPLE_SIGNING_CERT_P12_BASE64 }}
          p12-password: ${{ secrets.APPLE_SIGNING_CERT_PASSWORD }}
      - name: Configure Apple notary profile
        if: ${{ steps.signing.outputs.codesign == 'true' && steps.signing.outputs.notary == 'true' }}
        env:
          APPLE_NOTARY_APPLE_ID: ${{ secrets.APPLE_NOTARY_APPLE_ID }}
          APPLE_NOTARY_APP_PASSWORD: ${{ secrets.APPLE_NOTARY_APP_PASSWORD }}
          APPLE_NOTARY_TEAM_ID: ${{ secrets.APPLE_NOTARY_TEAM_ID }}
        run: |
          xcrun notarytool store-credentials termlm-notary \
            --apple-id "${APPLE_NOTARY_APPLE_ID}" \
            --password "${APPLE_NOTARY_APP_PASSWORD}" \
            --team-id "${APPLE_NOTARY_TEAM_ID}"
      - name: Codesign and notarize release bundles
        if: ${{ steps.signing.outputs.codesign == 'true' }}
        env:
          APPLE_CODESIGN_IDENTITY: ${{ secrets.APPLE_CODESIGN_IDENTITY }}
          APPLE_NOTARY_APPLE_ID: ${{ secrets.APPLE_NOTARY_APPLE_ID }}
          APPLE_NOTARY_APP_PASSWORD: ${{ secrets.APPLE_NOTARY_APP_PASSWORD }}
          APPLE_NOTARY_TEAM_ID: ${{ secrets.APPLE_NOTARY_TEAM_ID }}
        run: |
          args=(--dist dist --identity "${APPLE_CODESIGN_IDENTITY}")
          if [[ -n "${APPLE_NOTARY_APPLE_ID:-}" && -n "${APPLE_NOTARY_APP_PASSWORD:-}" && -n "${APPLE_NOTARY_TEAM_ID:-}" ]]; then
            args+=(--notary-profile termlm-notary)
          fi
          scripts/release/sign_and_notarize.sh "${args[@]}"
      - name: Assemble release checksums
        run: |
          find dist -maxdepth 1 -type f -name '*.sha256' -print | sort | while IFS= read -r checksum_file; do
            cat "$checksum_file"
          done > dist/SHA256SUMS
      - name: Summarize release artifacts
        run: |
          {
            echo "### Release Artifact Build"
            echo ""
            echo "- Tag: \`${TAG_NAME}\`"
            echo ""
            echo "Built files:"
            ls -1 dist | sed 's/^/- `/' | sed 's/$/`/'
            echo ""
            echo "SHA256SUMS:"
            echo '```text'
            cat dist/SHA256SUMS
            echo '```'
          } >> "${GITHUB_STEP_SUMMARY}"
      - name: Upload release artifacts
        uses: actions/upload-artifact@v6
        with:
          name: release-dist-${{ env.TAG_NAME }}-${{ github.run_id }}-${{ github.run_attempt }}
          path: dist/*
          if-no-files-found: error
      - name: Publish GitHub release assets
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          if gh release view "${TAG_NAME}" >/dev/null 2>&1; then
            gh release upload "${TAG_NAME}" dist/* --clobber
          else
            gh release create "${TAG_NAME}" dist/* \
              --target "${GITHUB_SHA}" \
              --title "${TAG_NAME}" \
              --notes "termlm ${TAG_NAME}"
          fi

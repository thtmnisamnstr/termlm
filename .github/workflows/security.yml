name: security

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  audit-and-sbom:
    runs-on: ubuntu-24.04
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - run: cargo install cargo-audit --locked
      - run: cargo install cargo-cyclonedx --locked
      - run: cargo audit --deny warnings
      - run: cargo cyclonedx --format json --override-filename termlm-sbom
      - run: find crates -maxdepth 2 -type f -name 'termlm-sbom.json' | grep .
      - name: Upload SBOM artifact
        uses: actions/upload-artifact@v6
        with:
          name: termlm-sbom-${{ github.run_id }}-${{ github.run_attempt }}
          path: crates/*/termlm-sbom.json
          if-no-files-found: error

name: ci

on:
  push:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  rust-macos-quick:
    runs-on: macos-14-arm64
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - run: if ! command -v cmake >/dev/null 2>&1; then brew install cmake; fi
      - run: cargo test --workspace --locked --no-run
      - run: bash tests/compatibility/macos_profile.sh

  rust-linux-quick:
    runs-on: ubuntu-24.04
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - run: sudo apt-get update && sudo apt-get install -y shellcheck ripgrep
      - run: python3 scripts/ci/check_docs_links.py
      - run: bash scripts/ci/lint_shell.sh
      - run: cargo fmt --check
      - run: cargo clippy --workspace --locked -- -D warnings
      - run: cargo test --workspace --locked
